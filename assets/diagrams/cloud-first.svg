<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 220" role="img" aria-labelledby="t d">
  <title id="t">Cloud-first model diagram</title>
  <desc id="d">Developer points to Platform which points to Users.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#63F6FF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#00E5FF"/>
    </marker>
  </defs>
  <rect x="20" y="45" width="180" height="130" rx="16" fill="#101A2E" stroke="#2C3F66"/>
  <rect x="280" y="45" width="180" height="130" rx="16" fill="#101A2E" stroke="url(#g)" stroke-width="2"/>
  <rect x="540" y="45" width="180" height="130" rx="16" fill="#101A2E" stroke="#2C3F66"/>
  <text x="110" y="118" text-anchor="middle" fill="#E6EDF3" font-family="Inter, system-ui" font-size="24">Developer</text>
  <text x="370" y="118" text-anchor="middle" fill="#E6EDF3" font-family="Inter, system-ui" font-size="24">Platform</text>
  <text x="630" y="118" text-anchor="middle" fill="#E6EDF3" font-family="Inter, system-ui" font-size="24">Users</text>
  <line x1="202" y1="110" x2="276" y2="110" stroke="#00E5FF" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="462" y1="110" x2="536" y2="110" stroke="#00E5FF" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
